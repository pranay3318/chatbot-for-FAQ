<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI FAQ Chatbot</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Animated Background -->

<div class="animated-bg">

    <div class="person left-person">
        <div class="head"></div>
        <div class="body"></div>
    </div>

    <div class="chat-bubble bubble1">
        Hello 👋
    </div>

    <div class="chat-bubble bubble2">
        How are you?
    </div>

    <div class="person right-person">
        <div class="head"></div>
        <div class="body"></div>
    </div>

</div>

<!-- Chatbot -->

<div class="container">

    <h1>🤖 AI FAQ Chatbot</h1>

    <div id="chatArea"></div>

    <div class="input-box">

        <input
            type="text"
            id="userInput"
            placeholder="Ask me anything..."
        >

        <button id="sendBtn">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
